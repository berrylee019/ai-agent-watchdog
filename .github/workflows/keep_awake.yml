name: Wake Up Apps

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  wake_up:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome and Drivers
        run: |
          pip install selenium webdriver-manager

      - name: Force Wake Up with Button Click
        run: |
          python - <<EOF
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from selenium.webdriver.common.by import By
          from webdriver_manager.chrome import ChromeDriverManager
          import time

          apps = [
              "https://style-scan-vip1.streamlit.app/",
              "https://bw-chef.streamlit.app/",
              "https://microbiome-ai-lab.streamlit.app/",
              "https://chef-noir.streamlit.app/",
              "https://stylescan-ai.streamlit.app/",
              "https://longevity-os.streamlit.app/",
              "https://misatech-surop.streamlit.app/"
          ]

          options = Options()
          options.add_argument("--headless")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          options.add_argument("user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36")

          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=options)

          for app in apps:
              print(f"--- 🚨 Force Waking: {app} ---")
              try:
                  driver.get(app)
                  time.sleep(10) # 페이지 로딩 대기
                  
                  # "Yes, get this app back up!" 버튼 찾기 (여러가지 케이스 대비)
                  buttons = driver.find_elements(By.XPATH, "//button[contains(text(), 'Yes')]")
                  if buttons:
                      buttons[0].click()
                      print("   👉 Found the button and CLICKED it!")
                      time.sleep(40) # 클릭 후 서버가 올라올 때까지 충분히 대기
                  else:
                      print("   ✅ App is already awake or button not found. Waiting 30s...")
                      time.sleep(30)
                      
                  print(f"--- Done with {app} ---")
              except Exception as e:
                  print(f"❌ Error on {app}: {e}")

          driver.quit()
          EOF
