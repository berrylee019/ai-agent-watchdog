import requests
          import time

          apps = [
              "https://style-scan-vip1.streamlit.app/",
              "https://bw-chef.streamlit.app/",
              "https://microbiome-ai-lab.streamlit.app/",
              "https://chef-noir.streamlit.app/",
              "https://stylescan-ai.streamlit.app/",
              "https://longevity-os.streamlit.app/",
              "https://misatech-surop.streamlit.app/"
          ]

          for app in apps:
              print(f"--- 🚨 Intensive Waking: {app} ---")
              try:
                  # 60초 동안 10초 간격으로 6번 연속 노크
                  for i in range(6):
                      r = requests.get(app, timeout=30)
                      print(f"   [{i+1}/6] Status: {r.status_code} - Waiting for server boot...")
                      time.sleep(10) 
                  print(f"✅ Finished signaling {app}")
              except Exception as e:
                  print(f"❌ Error on {app}: {e}")
