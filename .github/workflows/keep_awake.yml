name: Wake Up Apps

on:
  workflow_dispatch: # 이 문구가 있어야 'Run workflow' 버튼이 생깁니다!
  schedule:
    - cron: '0 */3 * * *'

jobs:
  wake_up:
    runs-on: ubuntu-latest
    steps:
      - name: Run Waking Script
        run: |
          python - <<EOF
          import requests
          import time
          apps = [
              "https://style-scan-vip1.streamlit.app/",
              "https://bw-chef.streamlit.app/",
              "https://microbiome-ai-lab.streamlit.app/",
              "https://chef-noir.streamlit.app/",
              "https://stylescan-ai.streamlit.app/",
              "https://longevity-os.streamlit.app/",
              "https://misatech-surop.streamlit.app/"
          ]
          for app in apps:
              print(f"Target: {app}")
              try:
                  for i in range(3): # 3번씩 강하게 노크
                      r = requests.get(app, timeout=20)
                      print(f"   Signal {i+1} sent (Status: {r.status_code})")
                      time.sleep(5)
              except:
                  print(f"Error on {app}")
          EOF
