name: Wake Up Apps

on:
  workflow_dispatch: # 수동 실행용

jobs:
  wake_up:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Start Signal
        run: echo "Starting the wake-up process for 형님's apps..."

      - name: 2. Main Execution
        run: |
          python - <<EOF
          import requests
          import time
          apps = [
              "https://style-scan-vip1.streamlit.app/",
              "https://bw-chef.streamlit.app/",
              "https://microbiome-ai-lab.streamlit.app/",
              "https://chef-noir.streamlit.app/",
              "https://stylescan-ai.streamlit.app/",
              "https://longevity-os.streamlit.app/",
              "https://misatech-surop.streamlit.app/"
          ]
          for app in apps:
              print(f"--- Waking up: {app} ---")
              try:
                  r = requests.get(app, timeout=20)
                  print(f"Status: {r.status_code}")
                  time.sleep(5) # 짧게 노크
              except:
                  print(f"Error on {app}")
          EOF

      - name: 3. Finish Signal
        run: echo "All done!"
